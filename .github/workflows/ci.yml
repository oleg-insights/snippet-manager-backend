name: Build app
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: node-modules-${{ hashFiles('**/package.json') }}
      - name: Install deps
        run: npm ci
      - name: Lint app
        run: npm run lint
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: node-modules-${{ hashFiles('**/package.json') }}
      - name: Install deps
        run: npm ci
      - name: Generate prisma client
        run: SKIP_ENV_VALIDATION=1 npx prisma generate
      - name: Build app
        run: npm run build
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Get code
        uses: actions/checkout@v6
      - name: Set node version
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: node-modules-${{ hashFiles('**/package.json') }}
      - name: Install deps
        run: npm ci
      - name: Generate prisma client
        run: SKIP_ENV_VALIDATION=1 npx prisma generate
      - name: Test e2e
        run: npm run test:e2e:ci
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: test_access_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db

